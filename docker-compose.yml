services:
  panio-mariadb:
    image: mariadb:11
    labels:
      - traefik.enable=false
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - panio_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lino

  panio-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      JWT_TOKEN_TTL: ${JWT_TOKEN_TTL:-2592000}
      MAILER_DSN: ${MAILER_DSN}
      MAILER_FROM: ${MAILER_FROM}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-${FRONTEND_URL}}
      APP_BACKEND_URL: ${APP_BACKEND_URL:-${BACKEND_URL}}
    depends_on:
      panio-mariadb:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=${DOCKER_NETWORK}
      - traefik.http.routers.panio-back.rule=Host(`${BACKEND_HOST}`)
      - traefik.http.routers.panio-back.entrypoints=${TRAEFIK_ENTRYPOINT}
      - traefik.http.routers.panio-back.service=panio-back
      - traefik.http.services.panio-back.loadbalancer.server.port=80
    networks:
      - lino

  panio-frontend:
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - panio-backend
    labels:
      - traefik.enable=true
      - traefik.docker.network=${DOCKER_NETWORK}
      - traefik.http.routers.panio-front.rule=Host(`${FRONTEND_HOST}`)
      - traefik.http.routers.panio-front.entrypoints=${TRAEFIK_ENTRYPOINT}
      - traefik.http.routers.panio-front.service=panio-front
      - traefik.http.services.panio-front.loadbalancer.server.port=3000
    networks:
      - lino

networks:
  lino:
    external: true
    name: ${DOCKER_NETWORK}

volumes:
  panio_mariadb_data:
