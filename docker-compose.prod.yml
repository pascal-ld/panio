services:
  panio-backend:
    image: panio-backend:latest
    pull_policy: build
    restart: unless-stopped
    volumes:
      - panio_uploads:/var/www/html/public/uploads
      # Lecture/écriture : génération des clés JWT depuis le conteneur (lexik:jwt:generate-keypair)
      - ./backend/config/jwt:/var/www/html/config/jwt
    labels:
      - traefik.http.routers.panio-back.tls=true
      - traefik.http.routers.panio-back.tls.certresolver=${TRAEFIK_CERT_RESOLVER}

  panio-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: panio-frontend:latest
    pull_policy: build
    restart: unless-stopped
    command: npm start
    labels:
      - traefik.http.routers.panio-front.tls=true
      - traefik.http.routers.panio-front.tls.certresolver=${TRAEFIK_CERT_RESOLVER}

volumes:
  panio_uploads:
